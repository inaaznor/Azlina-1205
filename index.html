<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apa nak makan tonight?</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
      color: #333;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }
    h1 {
      font-size: 3rem;
      background: -webkit-linear-gradient(#f44336, #e91e63);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2rem;
      line-height: 1.2;
    }
    button {
      padding: 1rem 2rem;
      font-size: 1.5rem;
      font-weight: bold;
      background: #ff4757;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
      transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: scale(1.05);
      background: #ff6b81;
      box-shadow: 0 6px 20px rgba(255, 71, 87, 0.6);
    }
    button:active {
      transform: scale(0.95);
    }
    #result {
      margin-top: 3rem;
      font-size: 3.5rem;
      font-weight: bold;
      color: #2f3542;
      min-height: 100px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }
    @media (max-width: 600px) {
      h1 { font-size: 2.2rem; }
      button { font-size: 1.2rem; padding: 0.8rem 1.5rem; }
      #result { font-size: 2.5rem; }
    }
  </style>
</head>
<body>
  <h1>Apa nak makan tonight? 😋</h1>
  <button onclick="pickDish()">Pilih untuk saya!</button>
  <div id="result"></div>
  <script>
    const dishes = [
      { name: "Nasi Lemak", emoji: "🍚🥥" },
      { name: "Roti Canai", emoji: "🥐🍛" },
      { name: "Laksa", emoji: "🍜" },
      { name: "Satay", emoji: "🍢🥜" },
      { name: "Mee Goreng", emoji: "🍝🔥" },
      { name: "Cendol", emoji: "🍧🧊" },
      { name: "Rendang", emoji: "🥩🥥" },
      { name: "Teh Tarik", emoji: "☕" },
      { name: "Mee Rebus", emoji: "🍲" },
      { name: "Nasi Kerabu", emoji: "🥗🍚" }
    ];
    function pickDish() {
      const resultEl = document.getElementById('result');
      const dish = dishes[Math.floor(Math.random() * dishes.length)];
      resultEl.innerText = `${dish.name} ${dish.emoji}`;
      
      // Simple pop animation trigger
      resultEl.style.transform = 'scale(0.8)';
      setTimeout(() => resultEl.style.transform = 'scale(1)', 50);
      resultEl.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
    }
  </script>
</body>
</html>
