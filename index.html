<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apa nak makan tonight?</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
      background-color: #ffd32a;
      color: #000;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
      overflow-x: hidden;
    }
    h1 {
      font-size: 4rem;
      font-weight: 900;
      margin-bottom: 2rem;
      line-height: 1.1;
      text-transform: uppercase;
      text-shadow: 4px 4px 0 #fff;
      transform: rotate(-2deg);
    }
    button {
      padding: 1.2rem 2.5rem;
      font-size: 1.8rem;
      font-weight: 900;
      background: #ff3f34;
      color: white;
      border: 4px solid #000;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 6px 6px 0 #000;
      transition: all 0.1s ease-in-out;
    }
    button:hover {
      transform: translate(-2px, -2px);
      box-shadow: 8px 8px 0 #000;
      background: #ff5e57;
    }
    button:active {
      transform: translate(4px, 4px);
      box-shadow: 2px 2px 0 #000;
      background: #ff3f34;
    }
    #result-container {
      margin-top: 3rem;
      min-height: 120px;
    }
    .result-card {
      font-size: 3rem;
      font-weight: 900;
      background: #fff;
      padding: 20px 40px;
      border: 4px solid #000;
      border-radius: 16px;
      box-shadow: 8px 8px 0 #000;
      display: inline-block;
      opacity: 0;
      transition: opacity 0.2s, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .result-card.show {
      opacity: 1;
      transform: scale(1) rotate(1deg);
    }
    @media (max-width: 600px) {
      h1 { font-size: 2.5rem; }
      button { font-size: 1.4rem; padding: 1rem 1.5rem; box-shadow: 4px 4px 0 #000; }
      .result-card { font-size: 2rem; padding: 15px 25px; box-shadow: 5px 5px 0 #000; }
    }
  </style>
</head>
<body>
  <h1>Apa nak<br>makan tonight?</h1>
  <button onclick="pickDish()">PILIH UNTUK SAYA! 🎲</button>
  <div id="result-container">
    <div id="result" class="result-card"></div>
  </div>
  <script>
    const dishes = [
      { name: "Nasi Lemak", emoji: "🍚🥥" }, { name: "Roti Canai", emoji: "🥐🍛" },
      { name: "Laksa", emoji: "🍜" }, { name: "Satay", emoji: "🍢🥜" },
      { name: "Mee Goreng", emoji: "🍝🔥" }, { name: "Cendol", emoji: "🍧🧊" },
      { name: "Rendang", emoji: "🥩🥥" }, { name: "Teh Tarik", emoji: "☕" },
      { name: "Mee Rebus", emoji: "🍲" }, { name: "Nasi Kerabu", emoji: "🥗🍚" }
    ];
    function pickDish() {
      const el = document.getElementById('result');
      const d = dishes[Math.floor(Math.random() * dishes.length)];
      el.classList.remove('show');
      el.style.transform = 'scale(0.8) rotate(-5deg)';
      setTimeout(() => {
        el.innerText = `${d.name} ${d.emoji}`;
        el.classList.add('show');
      }, 50);
    }
  </script>
</body>
</html>
